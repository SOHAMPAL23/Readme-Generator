version: '3.9'

services:
  readmeai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: readmeai
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - GIN_MODE=release
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.readmeai.description=AI-Powered GitHub README Generator"
      - "com.readmeai.version=1.0.0"
